<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Haushaltsapp Icon</title>
  <desc id="desc">Modernes App-Icon mit Haus, Checkmark und Glanzsymbolen für eine Haushaltsapp.</desc>

  <defs>
    <linearGradient id="bgGradient" x1="512" y1="0" x2="512" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#238CF5"/>
      <stop offset="0.58" stop-color="#17B9D6"/>
      <stop offset="1" stop-color="#12C7A7"/>
    </linearGradient>

    <linearGradient id="checkGradient" x1="362" y1="672" x2="768" y2="474" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0FBCA7"/>
      <stop offset="1" stop-color="#029A8E"/>
    </linearGradient>

    <linearGradient id="windowGradient" x1="512" y1="418" x2="512" y2="548" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1D8DE4"/>
      <stop offset="1" stop-color="#0879C8"/>
    </linearGradient>

    <filter id="softShadow" x="120" y="130" width="790" height="760" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#004B69" flood-opacity="0.22"/>
    </filter>

    <filter id="smallShadow" x="300" y="430" width="520" height="390" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#005B60" flood-opacity="0.18"/>
    </filter>

    <clipPath id="roundedApp">
      <rect width="1024" height="1024" rx="220"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedApp)">
    <rect width="1024" height="1024" rx="220" fill="url(#bgGradient)"/>

    <!-- subtle lower depth shape -->
    <path d="M-80 720C90 670 203 740 298 820C388 896 500 858 589 811C711 747 811 676 1104 687V1060H-80V720Z" fill="#0795B8" opacity="0.18"/>
    <path d="M-70 776C105 720 218 789 306 849C415 924 528 890 626 834C759 758 875 717 1098 746V1064H-70V776Z" fill="#007C9F" opacity="0.14"/>

    <!-- sparkles -->
    <path d="M274 140L292 206C300 236 324 260 354 268L420 286L354 304C324 312 300 336 292 366L274 432L256 366C248 336 224 312 194 304L128 286L194 268C224 260 248 236 256 206L274 140Z" fill="white" opacity="0.98"/>
    <path d="M176 314L186 352C190 370 204 384 222 388L260 398L222 408C204 412 190 426 186 444L176 482L166 444C162 426 148 412 130 408L92 398L130 388C148 384 162 370 166 352L176 314Z" fill="white" opacity="0.96"/>

    <!-- chimney -->
    <path d="M660 254C660 244 668 236 678 236H736C746 236 754 244 754 254V418H660V254Z" fill="white" opacity="0.98" filter="url(#softShadow)"/>

    <!-- house -->
    <g filter="url(#softShadow)">
      <path d="M229 544V742C229 806 281 858 345 858H679C743 858 795 806 795 742V544L512 288L229 544Z" fill="white"/>
      <path d="M188 552C165 552 151 525 166 507L458 230C489 201 535 201 566 230L858 507C873 525 859 552 836 552H799L512 292L225 552H188Z" fill="white"/>
      <path d="M229 544V742C229 806 281 858 345 858H679C743 858 795 806 795 742V544L512 288L229 544Z" fill="url(#windowGradient)" opacity="0.05"/>
    </g>

    <!-- window -->
    <g fill="url(#windowGradient)">
      <rect x="444" y="412" width="60" height="60" rx="10"/>
      <rect x="520" y="412" width="60" height="60" rx="10"/>
      <rect x="444" y="488" width="60" height="60" rx="10"/>
      <rect x="520" y="488" width="60" height="60" rx="10"/>
    </g>

    <!-- checkmark -->
    <path filter="url(#smallShadow)" d="M384 664L503 780L748 526" stroke="url(#checkGradient)" stroke-width="78" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
